<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!-- INLINE_CSS -->
</head>
<body>
  <div id="app">
    <div class="server-status" id="server-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="server-label">Checking render server...</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="paste">Paste</button>
      <button class="tab" data-tab="url">URL</button>
      <button class="tab" data-tab="file">File</button>
    </div>

    <div id="tab-paste" class="tab-content active">
      <textarea id="html-input" placeholder="Paste your HTML here...&#10;&#10;Example:&#10;<div style='display:flex; gap:12px; padding:24px; background:#fff;'>&#10;  <h1>Hello World</h1>&#10;  <p>This will become editable Figma layers</p>&#10;</div>" spellcheck="false"></textarea>
    </div>

    <div id="tab-url" class="tab-content">
      <div class="url-row">
        <input type="text" id="url-input" placeholder="https://example.com" />
        <button id="fetch-btn" class="secondary-btn">Fetch</button>
      </div>
      <p class="hint" id="url-hint">Some sites may block cross-origin requests. Start the render server for direct URL import.</p>
    </div>

    <div id="tab-file" class="tab-content">
      <label class="file-label" id="file-drop-zone">
        <input type="file" id="file-input" accept=".html,.htm" />
        <span class="file-icon">&#128196;</span>
        <span>Choose HTML file</span>
      </label>
      <label class="file-label">
        <input type="file" id="folder-input" webkitdirectory />
        <span class="file-icon">&#128193;</span>
        <span>Choose folder (imports ALL HTML files)</span>
      </label>
      <div id="file-name" class="file-name"></div>
    </div>

    <div class="viewport-row">
      <label class="viewport-label">Viewport width</label>
      <div class="viewport-presets">
        <button class="preset active" data-width="1440">Desktop</button>
        <button class="preset" data-width="1280">Laptop</button>
        <button class="preset" data-width="768">Tablet</button>
        <button class="preset" data-width="375">Mobile</button>
      </div>
      <input type="number" id="viewport-width" value="1440" min="320" max="3840" />
      <span class="viewport-unit">px</span>
    </div>

    <div id="progress" class="hidden">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <span id="progress-text">Converting...</span>
    </div>

    <div id="batch-progress" class="hidden">
      <span id="batch-text" class="batch-text"></span>
    </div>

    <div id="status" class="hidden"></div>

    <button id="convert-btn" class="primary-btn">Import to Figma</button>
  </div>

  <!-- INLINE_JS -->
</body>
</html>
