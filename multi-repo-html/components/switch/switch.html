<!--
  switch.html — Switch Component Variants
  Design system: bubbles-kit
  Synced from: multi-repo-nextjs/app/components/Switch/Switch.tsx

  STATIC VISUAL REPRESENTATION — no JavaScript.
  Modifier classes (.on, .disabled) on .ds-switch control visual state.
  Thumb position is pure CSS via transform: translateX.

  data-component="Switch" | data-state="on|off" | data-disabled="true|false"
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switch — Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/primitives.css" />
  <link rel="stylesheet" href="../../tokens/semantic.css" />
  <link rel="stylesheet" href="../../tokens/spacing.css" />
  <link rel="stylesheet" href="../../tokens/radius.css" />
  <link rel="stylesheet" href="switch.css" />
  <style>
    body { font-family: 'Geist', sans-serif; background: var(--surfaces-base-primary); padding: 32px; }
    .section { margin-bottom: 32px; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--typography-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .stack { display: flex; flex-direction: column; gap: 12px; }
    .row { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  </style>
</head>
<body>

  <!-- ALL STATES — with label -->
  <div class="section">
    <div class="section-title">All States — With Label</div>
    <div class="stack">

      <!-- Off -->
      <div class="ds-switch" role="switch" aria-checked="false"
        data-component="Switch" data-state="off" data-disabled="false">
        <div class="ds-switch-track">
          <div class="ds-switch-thumb"></div>
        </div>
        <span class="ds-switch-label">Enable notifications</span>
      </div>

      <!-- On -->
      <div class="ds-switch on" role="switch" aria-checked="true"
        data-component="Switch" data-state="on" data-disabled="false">
        <div class="ds-switch-track">
          <div class="ds-switch-thumb"></div>
        </div>
        <span class="ds-switch-label">Enable notifications</span>
      </div>

    </div>
  </div>

  <!-- DISABLED STATES -->
  <div class="section">
    <div class="section-title">Disabled States</div>
    <div class="stack">

      <!-- Disabled off -->
      <div class="ds-switch disabled" role="switch" aria-checked="false" aria-disabled="true"
        data-component="Switch" data-state="off" data-disabled="true">
        <div class="ds-switch-track">
          <div class="ds-switch-thumb"></div>
        </div>
        <span class="ds-switch-label">Disabled off</span>
      </div>

      <!-- Disabled on -->
      <div class="ds-switch on disabled" role="switch" aria-checked="true" aria-disabled="true"
        data-component="Switch" data-state="on" data-disabled="true">
        <div class="ds-switch-track">
          <div class="ds-switch-thumb"></div>
        </div>
        <span class="ds-switch-label">Disabled on</span>
      </div>

    </div>
  </div>

  <!-- WITHOUT LABEL — track only -->
  <div class="section">
    <div class="section-title">Without Label (track only)</div>
    <div class="row">

      <!-- Off — no label -->
      <div class="ds-switch" role="switch" aria-checked="false" aria-label="Setting off"
        data-component="Switch" data-state="off">
        <div class="ds-switch-track">
          <div class="ds-switch-thumb"></div>
        </div>
      </div>

      <!-- On — no label -->
      <div class="ds-switch on" role="switch" aria-checked="true" aria-label="Setting on"
        data-component="Switch" data-state="on">
        <div class="ds-switch-track">
          <div class="ds-switch-thumb"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- SETTINGS LIST — typical usage pattern -->
  <div class="section">
    <div class="section-title">Typical Settings Usage</div>
    <div class="stack">

      <div class="ds-switch on" role="switch" aria-checked="true"
        data-component="Switch" data-state="on">
        <div class="ds-switch-track"><div class="ds-switch-thumb"></div></div>
        <span class="ds-switch-label">Push notifications</span>
      </div>

      <div class="ds-switch" role="switch" aria-checked="false"
        data-component="Switch" data-state="off">
        <div class="ds-switch-track"><div class="ds-switch-thumb"></div></div>
        <span class="ds-switch-label">Email digest</span>
      </div>

      <div class="ds-switch on" role="switch" aria-checked="true"
        data-component="Switch" data-state="on">
        <div class="ds-switch-track"><div class="ds-switch-thumb"></div></div>
        <span class="ds-switch-label">Dark mode</span>
      </div>

      <div class="ds-switch disabled" role="switch" aria-checked="false" aria-disabled="true"
        data-component="Switch" data-state="off" data-disabled="true">
        <div class="ds-switch-track"><div class="ds-switch-thumb"></div></div>
        <span class="ds-switch-label">Beta features (unavailable on free plan)</span>
      </div>

    </div>
  </div>

</body>
</html>
