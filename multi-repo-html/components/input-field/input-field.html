<!--
  input-field.html — InputField + TextField Component Variants
  Design system: bubbles-kit (Figma node 90:3753 / 90:3525)
  Synced from: multi-repo-nextjs/app/components/InputField/InputField.tsx

  Renders all 7 states × both types + slot variations.
  data-component="InputField"|"TextField" | data-state="{state}"
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InputField — Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/primitives.css" />
  <link rel="stylesheet" href="../../tokens/semantic.css" />
  <link rel="stylesheet" href="../../tokens/spacing.css" />
  <link rel="stylesheet" href="../../tokens/radius.css" />
  <link rel="stylesheet" href="input-field.css" />
  <style>
    body { font-family: 'Geist', sans-serif; background: var(--surfaces-base-primary); padding: 32px; }
    .section { margin-bottom: 40px; max-width: 480px; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--typography-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .stack { display: flex; flex-direction: column; gap: 16px; }
    /* Placeholder icon square for slot icons */
    .slot-icon-sq { display: inline-block; width: 20px; height: 20px; border-radius: 3px; background: currentColor; opacity: 0.5; }
    /* State icon placeholders */
    .state-icon-sq { display: inline-block; width: 20px; height: 20px; border-radius: 50%; background: currentColor; opacity: 0.6; }
  </style>
</head>
<body>

  <!-- SINGLE-LINE INPUT — all 7 states -->
  <div class="section">
    <div class="section-title">InputField — All States</div>
    <div class="stack">

      <!-- Default (no border at rest) -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="default">
        <label class="ds-input-label" for="input-default">Email</label>
        <div class="ds-input-row default">
          <input class="ds-input-el" id="input-default" type="email" placeholder="you@example.com" />
        </div>
      </div>

      <!-- Focus (active border — simulated via .focus class) -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="focus">
        <label class="ds-input-label" for="input-focus">Email</label>
        <div class="ds-input-row focus">
          <input class="ds-input-el" id="input-focus" type="email" placeholder="Focused…" />
        </div>
      </div>

      <!-- Filled (has value, active border) -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="filled">
        <label class="ds-input-label" for="input-filled">Email</label>
        <div class="ds-input-row filled">
          <input class="ds-input-el" id="input-filled" type="email" value="john@example.com" />
        </div>
      </div>

      <!-- Success -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="success">
        <label class="ds-input-label" for="input-success">Email</label>
        <div class="ds-input-row success">
          <input class="ds-input-el" id="input-success" type="email" value="valid@example.com" />
          <!-- Trailing state icon (check circle placeholder) -->
          <span class="ds-input-state-icon" aria-hidden="true">
            <span class="state-icon-sq"></span>
          </span>
        </div>
        <p class="ds-input-hint success">Email looks good!</p>
      </div>

      <!-- Warning -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="warning">
        <label class="ds-input-label" for="input-warning">Username</label>
        <div class="ds-input-row warning">
          <input class="ds-input-el" id="input-warning" type="text" value="user_123" />
          <span class="ds-input-state-icon" aria-hidden="true">
            <span class="state-icon-sq"></span>
          </span>
        </div>
        <p class="ds-input-hint warning">Username is taken — try another</p>
      </div>

      <!-- Error -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="error">
        <label class="ds-input-label" for="input-error">Email</label>
        <div class="ds-input-row error">
          <input class="ds-input-el" id="input-error" type="email" value="notanemail" aria-invalid="true" />
          <span class="ds-input-state-icon" aria-hidden="true">
            <span class="state-icon-sq"></span>
          </span>
        </div>
        <p class="ds-input-hint error">Please enter a valid email address</p>
      </div>

      <!-- Disabled -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="disabled">
        <label class="ds-input-label" for="input-disabled">Email</label>
        <div class="ds-input-row disabled">
          <input class="ds-input-el" id="input-disabled" type="email" value="readonly@example.com" disabled />
        </div>
      </div>

    </div>
  </div>

  <!-- WITH LEADING/TRAILING SLOTS -->
  <div class="section">
    <div class="section-title">InputField — With Slots</div>
    <div class="stack">

      <!-- Leading icon only -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="default">
        <label class="ds-input-label" for="input-leading-icon">Search</label>
        <div class="ds-input-row default">
          <span class="ds-input-slot" aria-hidden="true"><span class="slot-icon-sq"></span></span>
          <input class="ds-input-el" id="input-leading-icon" type="search" placeholder="Search…" />
        </div>
      </div>

      <!-- Leading label slot + separator -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="default">
        <label class="ds-input-label" for="input-leading-label">Amount</label>
        <div class="ds-input-row default">
          <span class="ds-input-slot">USD</span>
          <div class="ds-input-separator"></div>
          <input class="ds-input-el" id="input-leading-label" type="number" placeholder="0.00" />
        </div>
      </div>

      <!-- Trailing label slot + separator -->
      <div class="ds-input-wrapper" data-component="InputField" data-state="default">
        <label class="ds-input-label" for="input-trailing-label">Weight</label>
        <div class="ds-input-row default">
          <input class="ds-input-el" id="input-trailing-label" type="number" placeholder="0" />
          <div class="ds-input-separator"></div>
          <span class="ds-input-slot">kg</span>
        </div>
      </div>

    </div>
  </div>

  <!-- TEXTFIELD (multiline) — all states -->
  <div class="section">
    <div class="section-title">TextField (multiline) — All States</div>
    <div class="stack">

      <!-- Default -->
      <div class="ds-input-wrapper" data-component="TextField" data-state="default">
        <label class="ds-input-label" for="tf-default">Bio</label>
        <div class="ds-text-field default">
          <textarea class="ds-input-el" id="tf-default" rows="3" placeholder="Tell us about yourself…"></textarea>
        </div>
      </div>

      <!-- Focus -->
      <div class="ds-input-wrapper" data-component="TextField" data-state="focus">
        <label class="ds-input-label" for="tf-focus">Bio</label>
        <div class="ds-text-field focus">
          <textarea class="ds-input-el" id="tf-focus" rows="3" placeholder="Focused state…"></textarea>
        </div>
      </div>

      <!-- Error -->
      <div class="ds-input-wrapper" data-component="TextField" data-state="error">
        <label class="ds-input-label" for="tf-error">Notes</label>
        <div class="ds-text-field error">
          <textarea class="ds-input-el" id="tf-error" rows="3" aria-invalid="true">Too short</textarea>
        </div>
        <p class="ds-input-hint error">Notes must be at least 20 characters</p>
      </div>

      <!-- Disabled -->
      <div class="ds-input-wrapper" data-component="TextField" data-state="disabled">
        <label class="ds-input-label" for="tf-disabled">Notes</label>
        <div class="ds-text-field disabled">
          <textarea class="ds-input-el" id="tf-disabled" rows="3" disabled>Read-only content…</textarea>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
