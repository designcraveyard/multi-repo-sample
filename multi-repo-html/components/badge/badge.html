<!--
  badge.html — Badge Component Variants
  Design system: bubbles-kit (Figma node 87:1071)
  Synced from: multi-repo-nextjs/app/components/Badge/Badge.tsx

  Renders all 4 types × 4 sizes × 2 subtle states = 32 combinations.
  data-component="Badge" | data-variant="{type}" | data-size="{size}" | data-state="subtle|solid"
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge — Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/primitives.css" />
  <link rel="stylesheet" href="../../tokens/semantic.css" />
  <link rel="stylesheet" href="../../tokens/spacing.css" />
  <link rel="stylesheet" href="../../tokens/radius.css" />
  <link rel="stylesheet" href="badge.css" />
  <style>
    body { font-family: 'Geist', sans-serif; background: var(--surfaces-base-primary); padding: 32px; }
    .section { margin-bottom: 32px; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--typography-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .row-label { font-size: 11px; color: var(--typography-muted); width: 80px; flex-shrink: 0; }
  </style>
</head>
<body>

  <!-- SOLID — all types × all sizes -->
  <div class="section">
    <div class="section-title">Solid (subtle=off)</div>

    <!-- Brand -->
    <div class="row">
      <span class="row-label">Brand</span>
      <!-- tiny: dot-only, no text -->
      <span class="ds-badge brand tiny"
        data-component="Badge" data-variant="brand" data-size="tiny"></span>
      <span class="ds-badge brand sm"
        data-component="Badge" data-variant="brand" data-size="sm">New</span>
      <span class="ds-badge brand number"
        data-component="Badge" data-variant="brand" data-size="number">42</span>
      <span class="ds-badge brand md"
        data-component="Badge" data-variant="brand" data-size="md">Brand</span>
    </div>

    <!-- Success -->
    <div class="row">
      <span class="row-label">Success</span>
      <span class="ds-badge success tiny"
        data-component="Badge" data-variant="success" data-size="tiny"></span>
      <span class="ds-badge success sm"
        data-component="Badge" data-variant="success" data-size="sm">Done</span>
      <span class="ds-badge success number"
        data-component="Badge" data-variant="success" data-size="number">3</span>
      <span class="ds-badge success md"
        data-component="Badge" data-variant="success" data-size="md">Active</span>
    </div>

    <!-- Error -->
    <div class="row">
      <span class="row-label">Error</span>
      <span class="ds-badge error tiny"
        data-component="Badge" data-variant="error" data-size="tiny"></span>
      <span class="ds-badge error sm"
        data-component="Badge" data-variant="error" data-size="sm">Error</span>
      <span class="ds-badge error number"
        data-component="Badge" data-variant="error" data-size="number">9</span>
      <span class="ds-badge error md"
        data-component="Badge" data-variant="error" data-size="md">Failed</span>
    </div>

    <!-- Accent -->
    <div class="row">
      <span class="row-label">Accent</span>
      <span class="ds-badge accent tiny"
        data-component="Badge" data-variant="accent" data-size="tiny"></span>
      <span class="ds-badge accent sm"
        data-component="Badge" data-variant="accent" data-size="sm">Pro</span>
      <span class="ds-badge accent number"
        data-component="Badge" data-variant="accent" data-size="number">7</span>
      <span class="ds-badge accent md"
        data-component="Badge" data-variant="accent" data-size="md">Premium</span>
    </div>
  </div>

  <!-- SUBTLE — all types × md size -->
  <div class="section">
    <div class="section-title">Subtle (subtle=on)</div>

    <div class="row">
      <span class="row-label">Brand</span>
      <span class="ds-badge brand sm subtle"
        data-component="Badge" data-variant="brand" data-size="sm" data-state="subtle">New</span>
      <span class="ds-badge brand number subtle"
        data-component="Badge" data-variant="brand" data-size="number" data-state="subtle">12</span>
      <span class="ds-badge brand md subtle"
        data-component="Badge" data-variant="brand" data-size="md" data-state="subtle">Brand</span>
    </div>

    <div class="row">
      <span class="row-label">Success</span>
      <span class="ds-badge success sm subtle"
        data-component="Badge" data-variant="success" data-size="sm" data-state="subtle">Done</span>
      <span class="ds-badge success number subtle"
        data-component="Badge" data-variant="success" data-size="number" data-state="subtle">3</span>
      <span class="ds-badge success md subtle"
        data-component="Badge" data-variant="success" data-size="md" data-state="subtle">Active</span>
    </div>

    <div class="row">
      <span class="row-label">Error</span>
      <span class="ds-badge error sm subtle"
        data-component="Badge" data-variant="error" data-size="sm" data-state="subtle">Error</span>
      <span class="ds-badge error number subtle"
        data-component="Badge" data-variant="error" data-size="number" data-state="subtle">9</span>
      <span class="ds-badge error md subtle"
        data-component="Badge" data-variant="error" data-size="md" data-state="subtle">Failed</span>
    </div>

    <div class="row">
      <span class="row-label">Accent</span>
      <span class="ds-badge accent sm subtle"
        data-component="Badge" data-variant="accent" data-size="sm" data-state="subtle">Pro</span>
      <span class="ds-badge accent number subtle"
        data-component="Badge" data-variant="accent" data-size="number" data-state="subtle">7</span>
      <span class="ds-badge accent md subtle"
        data-component="Badge" data-variant="accent" data-size="md" data-state="subtle">Premium</span>
    </div>
  </div>

</body>
</html>
