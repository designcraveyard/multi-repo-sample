<!--
  chip.html — Chip Component Variants
  Design system: bubbles-kit (Figma node 76:460)
  Synced from: multi-repo-nextjs/app/components/Chip/Chip.tsx

  Renders all 3 types × 3 sizes × 2 active states = 18 combinations.
  data-component="Chip" | data-variant="{type}" | data-size="{size}" | data-state="active|inactive"
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chip — Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/primitives.css" />
  <link rel="stylesheet" href="../../tokens/semantic.css" />
  <link rel="stylesheet" href="../../tokens/spacing.css" />
  <link rel="stylesheet" href="../../tokens/radius.css" />
  <link rel="stylesheet" href="chip.css" />
  <style>
    body { font-family: 'Geist', sans-serif; background: var(--surfaces-base-primary); padding: 32px; }
    .section { margin-bottom: 32px; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--typography-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .row-label { font-size: 11px; color: var(--typography-muted); width: 80px; flex-shrink: 0; }
    /* Track background for segment-control chips (the parent container) */
    .segment-track {
      display: inline-flex;
      align-items: center;
      padding: 4px;
      background-color: var(--surfaces-base-low-contrast);
      border-radius: var(--radius-full);
      gap: 0;
    }
  </style>
</head>
<body>

  <!-- CHIP TABS — all 3 sizes, inactive + active -->
  <div class="section">
    <div class="section-title">Chip Tabs</div>

    <div class="row">
      <span class="row-label">Small</span>
      <button class="ds-chip chip-tabs sm" role="tab" aria-selected="false"
        data-component="Chip" data-variant="chipTabs" data-size="sm" data-state="inactive">
        Inactive
      </button>
      <button class="ds-chip chip-tabs sm active" role="tab" aria-selected="true"
        data-component="Chip" data-variant="chipTabs" data-size="sm" data-state="active">
        Active
      </button>
    </div>

    <div class="row">
      <span class="row-label">Medium</span>
      <button class="ds-chip chip-tabs md" role="tab" aria-selected="false"
        data-component="Chip" data-variant="chipTabs" data-size="md" data-state="inactive">
        Inbox
      </button>
      <button class="ds-chip chip-tabs md active" role="tab" aria-selected="true"
        data-component="Chip" data-variant="chipTabs" data-size="md" data-state="active">
        Sent
      </button>
      <button class="ds-chip chip-tabs md" role="tab" aria-selected="false"
        data-component="Chip" data-variant="chipTabs" data-size="md" data-state="inactive">
        Archived
      </button>
    </div>

    <div class="row">
      <span class="row-label">Large</span>
      <button class="ds-chip chip-tabs lg" role="tab" aria-selected="false"
        data-component="Chip" data-variant="chipTabs" data-size="lg" data-state="inactive">
        All
      </button>
      <button class="ds-chip chip-tabs lg active" role="tab" aria-selected="true"
        data-component="Chip" data-variant="chipTabs" data-size="lg" data-state="active">
        Following
      </button>
    </div>
  </div>

  <!-- FILTERS — all 3 sizes, inactive + active -->
  <div class="section">
    <div class="section-title">Filters</div>

    <div class="row">
      <span class="row-label">Small</span>
      <button class="ds-chip filters sm" aria-pressed="false"
        data-component="Chip" data-variant="filters" data-size="sm" data-state="inactive">
        Price
      </button>
      <button class="ds-chip filters sm active" aria-pressed="true"
        data-component="Chip" data-variant="filters" data-size="sm" data-state="active">
        Recent
      </button>
    </div>

    <div class="row">
      <span class="row-label">Medium</span>
      <button class="ds-chip filters md" aria-pressed="false"
        data-component="Chip" data-variant="filters" data-size="md" data-state="inactive">
        Design
      </button>
      <button class="ds-chip filters md active" aria-pressed="true"
        data-component="Chip" data-variant="filters" data-size="md" data-state="active">
        Engineering
      </button>
      <button class="ds-chip filters md" aria-pressed="false"
        data-component="Chip" data-variant="filters" data-size="md" data-state="inactive">
        Marketing
      </button>
    </div>

    <div class="row">
      <span class="row-label">Large</span>
      <button class="ds-chip filters lg" aria-pressed="false"
        data-component="Chip" data-variant="filters" data-size="lg" data-state="inactive">
        Remote
      </button>
      <button class="ds-chip filters lg active" aria-pressed="true"
        data-component="Chip" data-variant="filters" data-size="lg" data-state="active">
        Full-time
      </button>
    </div>
  </div>

  <!-- SEGMENT CONTROL — all 3 sizes, inside track container -->
  <div class="section">
    <div class="section-title">Segment Control (inside track)</div>

    <div class="row">
      <span class="row-label">Small</span>
      <!-- Wrap in track container to provide the trough background -->
      <div class="segment-track">
        <button class="ds-chip segment-control sm active" role="radio" aria-checked="true"
          data-component="Chip" data-variant="segmentControl" data-size="sm" data-state="active">
          Day
        </button>
        <button class="ds-chip segment-control sm" role="radio" aria-checked="false"
          data-component="Chip" data-variant="segmentControl" data-size="sm" data-state="inactive">
          Week
        </button>
        <button class="ds-chip segment-control sm" role="radio" aria-checked="false"
          data-component="Chip" data-variant="segmentControl" data-size="sm" data-state="inactive">
          Month
        </button>
      </div>
    </div>

    <div class="row">
      <span class="row-label">Medium</span>
      <div class="segment-track">
        <button class="ds-chip segment-control md active" role="radio" aria-checked="true"
          data-component="Chip" data-variant="segmentControl" data-size="md" data-state="active">
          List
        </button>
        <button class="ds-chip segment-control md" role="radio" aria-checked="false"
          data-component="Chip" data-variant="segmentControl" data-size="md" data-state="inactive">
          Board
        </button>
        <button class="ds-chip segment-control md" role="radio" aria-checked="false"
          data-component="Chip" data-variant="segmentControl" data-size="md" data-state="inactive">
          Calendar
        </button>
      </div>
    </div>

    <div class="row">
      <span class="row-label">Large</span>
      <div class="segment-track">
        <button class="ds-chip segment-control lg active" role="radio" aria-checked="true"
          data-component="Chip" data-variant="segmentControl" data-size="lg" data-state="active">
          Overview
        </button>
        <button class="ds-chip segment-control lg" role="radio" aria-checked="false"
          data-component="Chip" data-variant="segmentControl" data-size="lg" data-state="inactive">
          Details
        </button>
      </div>
    </div>
  </div>

  <!-- DISABLED STATE -->
  <div class="section">
    <div class="section-title">Disabled</div>
    <div class="row">
      <button class="ds-chip chip-tabs md disabled" disabled
        data-component="Chip" data-variant="chipTabs" data-size="md" data-state="disabled">
        Disabled Tab
      </button>
      <button class="ds-chip filters md disabled" disabled
        data-component="Chip" data-variant="filters" data-size="md" data-state="disabled">
        Disabled Filter
      </button>
    </div>
  </div>

</body>
</html>
