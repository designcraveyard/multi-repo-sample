<!--
  segment-control-bar.html — SegmentControlBar Component Variants
  Design system: bubbles-kit (Figma node 81:637)
  Synced from: multi-repo-nextjs/app/components/SegmentControlBar/SegmentControlBar.tsx

  Renders all 3 types × 3 sizes = 9 combinations.
  NOTE: The sliding thumb in segment-control type is positioned via inline style
        in static HTML. In production React, useLayoutEffect animates it.

  data-component="SegmentControlBar" | data-variant="{type}" | data-size="{size}"
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SegmentControlBar — Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/primitives.css" />
  <link rel="stylesheet" href="../../tokens/semantic.css" />
  <link rel="stylesheet" href="../../tokens/spacing.css" />
  <link rel="stylesheet" href="../../tokens/radius.css" />
  <link rel="stylesheet" href="segment-control-bar.css" />
  <style>
    body { font-family: 'Geist', sans-serif; background: var(--surfaces-base-primary); padding: 32px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--typography-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .row { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
    .row-label { font-size: 11px; color: var(--typography-muted); width: 70px; flex-shrink: 0; }
  </style>
</head>
<body>

  <!-- SEGMENT CONTROL — all 3 sizes, first item active -->
  <div class="section">
    <div class="section-title">Segment Control (sliding thumb)</div>

    <!-- Small -->
    <div class="row">
      <span class="row-label">Small</span>
      <div class="ds-segment-bar segment-control sm" role="radiogroup"
        data-component="SegmentControlBar" data-variant="segmentControl" data-size="sm">
        <!-- Thumb positioned under first item (left=4, approx width=38px) -->
        <div class="ds-segment-thumb" style="left:4px; width:38px; top:4px; bottom:4px;"></div>
        <button class="ds-segment-item sm active" role="radio" aria-checked="true">Day</button>
        <button class="ds-segment-item sm" role="radio" aria-checked="false">Week</button>
        <button class="ds-segment-item sm" role="radio" aria-checked="false">Month</button>
      </div>
    </div>

    <!-- Medium -->
    <div class="row">
      <span class="row-label">Medium</span>
      <div class="ds-segment-bar segment-control md" role="radiogroup"
        data-component="SegmentControlBar" data-variant="segmentControl" data-size="md">
        <div class="ds-segment-thumb" style="left:4px; width:53px; top:4px; bottom:4px;"></div>
        <button class="ds-segment-item md active" role="radio" aria-checked="true">List</button>
        <button class="ds-segment-item md" role="radio" aria-checked="false">Board</button>
        <button class="ds-segment-item md" role="radio" aria-checked="false">Calendar</button>
      </div>
    </div>

    <!-- Large -->
    <div class="row">
      <span class="row-label">Large</span>
      <div class="ds-segment-bar segment-control lg" role="radiogroup"
        data-component="SegmentControlBar" data-variant="segmentControl" data-size="lg">
        <div class="ds-segment-thumb" style="left:4px; width:90px; top:4px; bottom:4px;"></div>
        <button class="ds-segment-item lg active" role="radio" aria-checked="true">Overview</button>
        <button class="ds-segment-item lg" role="radio" aria-checked="false">Details</button>
      </div>
    </div>
  </div>

  <!-- CHIPS — all 3 sizes -->
  <div class="section">
    <div class="section-title">Chips (tab-style row)</div>

    <div class="row">
      <span class="row-label">Small</span>
      <div class="ds-segment-bar chips sm" role="radiogroup"
        data-component="SegmentControlBar" data-variant="chips" data-size="sm">
        <button class="ds-segment-item sm active" role="radio" aria-checked="true">All</button>
        <button class="ds-segment-item sm" role="radio" aria-checked="false">Design</button>
        <button class="ds-segment-item sm" role="radio" aria-checked="false">Code</button>
      </div>
    </div>

    <div class="row">
      <span class="row-label">Medium</span>
      <div class="ds-segment-bar chips md" role="radiogroup"
        data-component="SegmentControlBar" data-variant="chips" data-size="md">
        <button class="ds-segment-item md active" role="radio" aria-checked="true">All</button>
        <button class="ds-segment-item md" role="radio" aria-checked="false">Active</button>
        <button class="ds-segment-item md" role="radio" aria-checked="false">Archived</button>
      </div>
    </div>

    <div class="row">
      <span class="row-label">Large</span>
      <div class="ds-segment-bar chips lg" role="radiogroup"
        data-component="SegmentControlBar" data-variant="chips" data-size="lg">
        <button class="ds-segment-item lg active" role="radio" aria-checked="true">Trending</button>
        <button class="ds-segment-item lg" role="radio" aria-checked="false">Latest</button>
      </div>
    </div>
  </div>

  <!-- FILTERS — all 3 sizes (multi-select) -->
  <div class="section">
    <div class="section-title">Filters (bordered, multi-select)</div>

    <div class="row">
      <span class="row-label">Small</span>
      <div class="ds-segment-bar filters sm" role="group"
        data-component="SegmentControlBar" data-variant="filters" data-size="sm">
        <button class="ds-segment-item sm active" role="checkbox" aria-checked="true">Remote</button>
        <button class="ds-segment-item sm active" role="checkbox" aria-checked="true">Full-time</button>
        <button class="ds-segment-item sm" role="checkbox" aria-checked="false">Contract</button>
      </div>
    </div>

    <div class="row">
      <span class="row-label">Medium</span>
      <div class="ds-segment-bar filters md" role="group"
        data-component="SegmentControlBar" data-variant="filters" data-size="md">
        <button class="ds-segment-item md" role="checkbox" aria-checked="false">Design</button>
        <button class="ds-segment-item md active" role="checkbox" aria-checked="true">Engineering</button>
        <button class="ds-segment-item md" role="checkbox" aria-checked="false">Marketing</button>
      </div>
    </div>

    <div class="row">
      <span class="row-label">Large</span>
      <div class="ds-segment-bar filters lg" role="group"
        data-component="SegmentControlBar" data-variant="filters" data-size="lg">
        <button class="ds-segment-item lg active" role="checkbox" aria-checked="true">2024</button>
        <button class="ds-segment-item lg" role="checkbox" aria-checked="false">2023</button>
        <button class="ds-segment-item lg" role="checkbox" aria-checked="false">2022</button>
      </div>
    </div>
  </div>

</body>
</html>
