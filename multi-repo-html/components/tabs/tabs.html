<!--
  tabs.html — Tabs Component Variants
  Design system: bubbles-kit (Figma node 76:660 + 78:284)
  Synced from: multi-repo-nextjs/app/components/Tabs/Tabs.tsx

  Renders all 3 sizes, with and without icons, and both active states.
  NOTE: The sliding indicator (ds-tab-indicator) is positioned via inline style
        in static HTML. In production React, useLayoutEffect measures the active
        tab and animates the indicator.

  data-component="Tabs" | data-variant="tab-bar" | data-size="{size}"
  data-component="Tab"  | data-state="active|inactive"
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabs — Variants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/primitives.css" />
  <link rel="stylesheet" href="../../tokens/semantic.css" />
  <link rel="stylesheet" href="../../tokens/spacing.css" />
  <link rel="stylesheet" href="../../tokens/radius.css" />
  <link rel="stylesheet" href="tabs.css" />
  <style>
    body { font-family: 'Geist', sans-serif; background: var(--surfaces-base-primary); padding: 32px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: 11px; font-weight: 600; color: var(--typography-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    /* Small icon placeholder for tab icons */
    .icon-sq { display: inline-block; width: 100%; height: 100%; border-radius: 2px; background: currentColor; opacity: 0.7; }
  </style>
</head>
<body>

  <!-- SMALL — text only, 3 tabs, middle active -->
  <div class="section">
    <div class="section-title">Small (sm)</div>
    <div class="ds-tab-bar" role="tablist" aria-label="Navigation"
      data-component="Tabs" data-variant="tab-bar" data-size="sm">
      <button class="ds-tab sm" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        Home
      </button>
      <button class="ds-tab sm active" role="tab" aria-selected="true" tabindex="0"
        data-component="Tab" data-state="active">
        Profile
      </button>
      <button class="ds-tab sm" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        Settings
      </button>
      <!-- Indicator positioned under "Profile" (approx 40px from left, ~57px wide) -->
      <div class="ds-tab-indicator" style="left:40px; width:57px;"></div>
    </div>
  </div>

  <!-- MEDIUM — text only, 4 tabs, first active -->
  <div class="section">
    <div class="section-title">Medium (md) — default</div>
    <div class="ds-tab-bar" role="tablist" aria-label="Navigation"
      data-component="Tabs" data-variant="tab-bar" data-size="md">
      <button class="ds-tab md active" role="tab" aria-selected="true" tabindex="0"
        data-component="Tab" data-state="active">
        Overview
      </button>
      <button class="ds-tab md" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        Activity
      </button>
      <button class="ds-tab md" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        Members
      </button>
      <button class="ds-tab md" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        Settings
      </button>
      <!-- Indicator positioned under "Overview" (0px from left, ~88px wide) -->
      <div class="ds-tab-indicator" style="left:0px; width:88px;"></div>
    </div>
  </div>

  <!-- LARGE — text only -->
  <div class="section">
    <div class="section-title">Large (lg)</div>
    <div class="ds-tab-bar" role="tablist" aria-label="Navigation"
      data-component="Tabs" data-variant="tab-bar" data-size="lg">
      <button class="ds-tab lg" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        Posts
      </button>
      <button class="ds-tab lg active" role="tab" aria-selected="true" tabindex="0"
        data-component="Tab" data-state="active">
        Replies
      </button>
      <button class="ds-tab lg" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        Media
      </button>
      <!-- Indicator under "Replies" (approx 72px from left, ~76px wide) -->
      <div class="ds-tab-indicator" style="left:72px; width:76px;"></div>
    </div>
  </div>

  <!-- MEDIUM WITH ICONS -->
  <div class="section">
    <div class="section-title">Medium with icons</div>
    <div class="ds-tab-bar" role="tablist" aria-label="Navigation"
      data-component="Tabs" data-variant="tab-bar" data-size="md">
      <button class="ds-tab md active" role="tab" aria-selected="true" tabindex="0"
        data-component="Tab" data-state="active">
        <span class="ds-tab-icon" aria-hidden="true"><span class="icon-sq"></span></span>
        Home
      </button>
      <button class="ds-tab md" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        <span class="ds-tab-icon" aria-hidden="true"><span class="icon-sq"></span></span>
        Explore
      </button>
      <button class="ds-tab md" role="tab" aria-selected="false" tabindex="-1"
        data-component="Tab" data-state="inactive">
        <span class="ds-tab-icon" aria-hidden="true"><span class="icon-sq"></span></span>
        Profile
      </button>
      <!-- Indicator under "Home" -->
      <div class="ds-tab-indicator" style="left:0px; width:72px;"></div>
    </div>
  </div>

</body>
</html>
