<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wireframe Elements — Design Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F1F5F9;
      font-family: var(--font-sans);
    }
    .demo-label {
      font-size: 11px;
      font-weight: 600;
      color: #64748B;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 20px 24px 8px;
    }

    /* --- Full wireframe page layout --- */
    .wireframe-page {
      display:        flex;
      flex-direction: column;
      min-height:     100vh;
      background:     var(--wireframe-bg);
    }

    /* Page content area */
    .wireframe-content {
      flex:       1;
      padding:    24px;
      display:    flex;
      flex-direction: column;
      gap:        24px;
    }

    /* Card shell */
    .wireframe-card {
      background:    var(--wireframe-surface);
      border:        1px solid var(--wireframe-border);
      border-radius: 12px;
      padding:       16px;
    }

    /* Two-column row */
    .wireframe-row {
      display: flex;
      gap:     16px;
    }
    .wireframe-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Divider */
    .wireframe-divider {
      height:     1px;
      background: var(--wireframe-border);
      margin:     4px 0;
    }

    /* List items */
    .wireframe-list-item {
      display:     flex;
      align-items: center;
      gap:         12px;
      padding:     10px 0;
      border-bottom: 1px solid var(--wireframe-border);
    }
    .wireframe-list-item:last-child {
      border-bottom: none;
    }
    .wireframe-list-thumb {
      width:         48px;
      height:        48px;
      border-radius: 8px;
      background:    var(--wireframe-placeholder);
      flex-shrink:   0;
    }
    .wireframe-list-text {
      flex:     1;
      display:  flex;
      flex-direction: column;
      gap:      6px;
    }
    .wireframe-list-chevron {
      width:         8px;
      height:        14px;
      background:    var(--wireframe-placeholder);
      border-radius: 2px;
    }

    /* --- Skeleton demo section --- */
    .skeleton-demo {
      padding: 24px;
      background: var(--wireframe-surface);
      border-top: 1px solid var(--wireframe-border);
    }
    .skeleton-demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .skeleton-card {
      background:    var(--wireframe-surface);
      border:        1px solid var(--wireframe-border);
      border-radius: 12px;
      padding:       16px;
      display:       flex;
      flex-direction: column;
      gap:           12px;
    }
    .skeleton-card-header {
      display:     flex;
      align-items: center;
      gap:         10px;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       FULL WIREFRAME PAGE LAYOUT
       Nav → Content (placeholders + text) → Tab bar
       ============================================================ -->
  <div class="wireframe-page">

    <!-- TOP NAV BAR -->
    <nav class="ds-wireframe-nav"
         data-component="WireframeNav"
         data-variant="nav-bar">
      <div class="ds-wireframe-nav-logo"></div>
      <div class="ds-wireframe-nav-items">
        <div class="ds-wireframe-nav-item active"></div>
        <div class="ds-wireframe-nav-item"></div>
        <div class="ds-wireframe-nav-item"></div>
      </div>
      <div class="ds-wireframe-nav-actions">
        <div class="ds-wireframe-nav-icon"></div>
        <div class="ds-wireframe-nav-avatar"></div>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="wireframe-content">

      <!-- Hero placeholder -->
      <div class="ds-wireframe-placeholder lg"
           data-component="WireframePlaceholder"
           data-variant="lg">
        <span class="ds-wireframe-placeholder-label">Hero Image — 100% × 240px</span>
      </div>

      <!-- Text block — heading + body -->
      <div class="ds-wireframe-text-block"
           data-component="WireframeText"
           data-variant="text-block">
        <div class="ds-wireframe-text heading"></div>
        <div class="ds-wireframe-text body"></div>
        <div class="ds-wireframe-text body short"></div>
      </div>

      <!-- Two-column card row -->
      <div class="wireframe-row">
        <div class="wireframe-col">
          <div class="wireframe-card">
            <div class="ds-wireframe-placeholder md"
                 data-component="WireframePlaceholder"
                 data-variant="md">
              <span class="ds-wireframe-placeholder-label">160px</span>
            </div>
            <div style="height:12px;"></div>
            <div class="ds-wireframe-text-block">
              <div class="ds-wireframe-text heading"></div>
              <div class="ds-wireframe-text body"></div>
              <div class="ds-wireframe-text body short"></div>
            </div>
          </div>
        </div>
        <div class="wireframe-col">
          <div class="wireframe-card">
            <div class="ds-wireframe-placeholder md">
              <span class="ds-wireframe-placeholder-label">160px</span>
            </div>
            <div style="height:12px;"></div>
            <div class="ds-wireframe-text-block">
              <div class="ds-wireframe-text heading"></div>
              <div class="ds-wireframe-text body"></div>
              <div class="ds-wireframe-text body short"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- List items -->
      <div class="wireframe-card">
        <div class="wireframe-list-item">
          <div class="wireframe-list-thumb"></div>
          <div class="wireframe-list-text">
            <div class="ds-wireframe-text heading" style="height:14px;width:60%;"></div>
            <div class="ds-wireframe-text body" style="height:10px;width:85%;"></div>
          </div>
          <div class="wireframe-list-chevron"></div>
        </div>
        <div class="wireframe-list-item">
          <div class="wireframe-list-thumb"></div>
          <div class="wireframe-list-text">
            <div class="ds-wireframe-text heading" style="height:14px;width:50%;"></div>
            <div class="ds-wireframe-text body" style="height:10px;width:75%;"></div>
          </div>
          <div class="wireframe-list-chevron"></div>
        </div>
        <div class="wireframe-list-item">
          <div class="wireframe-list-thumb"></div>
          <div class="wireframe-list-text">
            <div class="ds-wireframe-text heading" style="height:14px;width:70%;"></div>
            <div class="ds-wireframe-text body" style="height:10px;width:90%;"></div>
          </div>
          <div class="wireframe-list-chevron"></div>
        </div>
      </div>

      <!-- Small placeholders row -->
      <div class="wireframe-row" style="gap:12px;">
        <div class="ds-wireframe-placeholder sm"
             data-component="WireframePlaceholder"
             data-variant="sm">
          <span class="ds-wireframe-placeholder-label">sm</span>
        </div>
        <div class="ds-wireframe-placeholder sm">
          <span class="ds-wireframe-placeholder-label">sm</span>
        </div>
        <div class="ds-wireframe-placeholder sm">
          <span class="ds-wireframe-placeholder-label">sm</span>
        </div>
      </div>

    </main>

    <!-- BOTTOM TAB BAR -->
    <nav class="ds-wireframe-tab-bar"
         data-component="WireframeTabBar"
         data-variant="tab-bar">
      <div class="ds-wireframe-tab-item active">
        <div class="ds-wireframe-tab-item-icon"></div>
        <div class="ds-wireframe-tab-item-label"></div>
      </div>
      <div class="ds-wireframe-tab-item">
        <div class="ds-wireframe-tab-item-icon"></div>
        <div class="ds-wireframe-tab-item-label"></div>
      </div>
      <div class="ds-wireframe-tab-item">
        <div class="ds-wireframe-tab-item-icon"></div>
        <div class="ds-wireframe-tab-item-label"></div>
      </div>
      <div class="ds-wireframe-tab-item">
        <div class="ds-wireframe-tab-item-icon"></div>
        <div class="ds-wireframe-tab-item-label"></div>
      </div>
      <div class="ds-wireframe-tab-item">
        <div class="ds-wireframe-tab-item-icon"></div>
        <div class="ds-wireframe-tab-item-label"></div>
      </div>
    </nav>

  </div><!-- /wireframe-page -->


  <!-- ============================================================
       SKELETON LOADING STATE DEMO
       ============================================================ -->
  <div class="skeleton-demo">
    <div class="demo-label">Skeleton UI — Shimmer Animation</div>
    <div class="skeleton-demo-grid">

      <!-- Card skeleton -->
      <div class="skeleton-card"
           data-component="WireframeSkeleton"
           data-variant="card">
        <div class="ds-wireframe-skeleton card"></div>
        <div class="skeleton-card-header">
          <div class="ds-wireframe-skeleton avatar"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            <div class="ds-wireframe-skeleton md" style="width:70%;"></div>
            <div class="ds-wireframe-skeleton sm" style="width:50%;"></div>
          </div>
        </div>
        <div class="ds-wireframe-skeleton sm"></div>
        <div class="ds-wireframe-skeleton sm" style="width:80%;"></div>
      </div>

      <!-- List skeleton -->
      <div class="skeleton-card">
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="ds-wireframe-skeleton avatar"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
              <div class="ds-wireframe-skeleton md" style="width:65%;"></div>
              <div class="ds-wireframe-skeleton sm" style="width:45%;"></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="ds-wireframe-skeleton avatar"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
              <div class="ds-wireframe-skeleton md" style="width:80%;"></div>
              <div class="ds-wireframe-skeleton sm" style="width:55%;"></div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="ds-wireframe-skeleton avatar"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
              <div class="ds-wireframe-skeleton md" style="width:60%;"></div>
              <div class="ds-wireframe-skeleton sm" style="width:40%;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Text-only skeleton -->
      <div class="skeleton-card">
        <div class="ds-wireframe-skeleton lg"></div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px;">
          <div class="ds-wireframe-skeleton sm"></div>
          <div class="ds-wireframe-skeleton sm" style="width:90%;"></div>
          <div class="ds-wireframe-skeleton sm" style="width:75%;"></div>
          <div class="ds-wireframe-skeleton sm" style="width:85%;"></div>
          <div class="ds-wireframe-skeleton sm" style="width:60%;"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
