<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Frames — Design Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../design-system.css" />
  <style>
    body {
      background: #F1F5F9;
      padding: 40px;
    }
    .demo-section {
      margin-bottom: 60px;
    }
    .demo-label {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      color: #64748B;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    /* Scale down large devices for demo page */
    .demo-scaled {
      transform-origin: top left;
      display: inline-block;
    }
    .scale-iphone    { transform: scale(0.35); }
    .scale-ipad      { transform: scale(0.18); }
    .scale-browser   { transform: scale(0.22); }
    /* Wrapper needed to occupy correct space after transform */
    .scale-wrap-iphone      { display: inline-block; width: calc(393px * 0.35); height: calc(852px * 0.35); overflow: visible; }
    .scale-wrap-iphone-max  { display: inline-block; width: calc(430px * 0.35); height: calc(932px * 0.35); overflow: visible; }
    .scale-wrap-ipad        { display: inline-block; width: calc(1024px * 0.18); height: calc(1366px * 0.18); overflow: visible; }
    .scale-wrap-browser     { display: inline-block; width: calc(1440px * 0.22); height: calc(900px * 0.22); overflow: visible; }
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      align-items: flex-start;
    }
    /* Placeholder screen content */
    .screen-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      background: #F8FAFC;
      font-family: var(--font-sans);
    }
    .screen-placeholder-icon {
      width: 48px;
      height: 48px;
      background: #E2E8F0;
      border-radius: 12px;
    }
    .screen-placeholder-label {
      font-size: 14px;
      color: #94A3B8;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       IPHONE 16
       ============================================================ -->
  <div class="demo-section">
    <div class="demo-label">iPhone 16 — 393 × 852px</div>
    <div class="demo-row">
      <div class="scale-wrap-iphone">
        <div class="demo-scaled scale-iphone">
          <div class="ds-device ds-device-iphone"
               data-component="DeviceFrame"
               data-variant="iphone">
            <!-- Status bar with Dynamic Island -->
            <div class="ds-device-status-bar">
              <div class="ds-device-dynamic-island"></div>
              <span class="ds-device-time">9:41</span>
              <div class="ds-device-indicators">
                <!-- Signal bars (SVG inline) -->
                <svg width="17" height="12" viewBox="0 0 17 12" fill="none" aria-hidden="true">
                  <rect x="0" y="6" width="3" height="6" rx="1" fill="white" opacity="0.4"/>
                  <rect x="4.5" y="4" width="3" height="8" rx="1" fill="white" opacity="0.6"/>
                  <rect x="9" y="2" width="3" height="10" rx="1" fill="white" opacity="0.8"/>
                  <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
                </svg>
                <!-- WiFi icon -->
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" aria-hidden="true">
                  <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="white"/>
                  <path d="M3.5 6.2C5 4.7 6.4 4 8 4s3 .7 4.5 2.2" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8"/>
                  <path d="M1 3.5C3.4 1.2 5.6 0 8 0s4.6 1.2 7 3.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
                </svg>
                <!-- Battery -->
                <svg width="25" height="12" viewBox="0 0 25 12" fill="none" aria-hidden="true">
                  <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
                  <rect x="2" y="2" width="16" height="8" rx="2" fill="white"/>
                  <path d="M23 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/>
                </svg>
              </div>
            </div>
            <!-- Screen content area -->
            <div class="ds-device-screen">
              <div class="screen-placeholder">
                <div class="screen-placeholder-icon"></div>
                <span class="screen-placeholder-label">Screen Content</span>
              </div>
            </div>
            <!-- Home indicator -->
            <div class="ds-device-home-indicator"></div>
          </div>
        </div>
      </div>

      <!-- ============================================================
           IPHONE 16 PRO MAX
           ============================================================ -->
      <div class="scale-wrap-iphone-max">
        <div class="demo-scaled scale-iphone">
          <div class="ds-device ds-device-iphone-pro-max"
               data-component="DeviceFrame"
               data-variant="iphone-pro-max">
            <div class="ds-device-status-bar">
              <div class="ds-device-dynamic-island"></div>
              <span class="ds-device-time">9:41</span>
              <div class="ds-device-indicators">
                <svg width="17" height="12" viewBox="0 0 17 12" fill="none" aria-hidden="true">
                  <rect x="0" y="6" width="3" height="6" rx="1" fill="white"/>
                  <rect x="4.5" y="4" width="3" height="8" rx="1" fill="white"/>
                  <rect x="9" y="2" width="3" height="10" rx="1" fill="white"/>
                  <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
                </svg>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none" aria-hidden="true">
                  <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="white"/>
                  <path d="M3.5 6.2C5 4.7 6.4 4 8 4s3 .7 4.5 2.2" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                  <path d="M1 3.5C3.4 1.2 5.6 0 8 0s4.6 1.2 7 3.5" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
                </svg>
                <svg width="25" height="12" viewBox="0 0 25 12" fill="none" aria-hidden="true">
                  <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
                  <rect x="2" y="2" width="18" height="8" rx="2" fill="white"/>
                  <path d="M23 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/>
                </svg>
              </div>
            </div>
            <div class="ds-device-screen">
              <div class="screen-placeholder">
                <div class="screen-placeholder-icon"></div>
                <span class="screen-placeholder-label">Screen Content</span>
              </div>
            </div>
            <div class="ds-device-home-indicator"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       IPAD 13"
       ============================================================ -->
  <div class="demo-section">
    <div class="demo-label">iPad 13" — 1024 × 1366px</div>
    <div class="scale-wrap-ipad">
      <div class="demo-scaled scale-ipad">
        <div class="ds-device ds-device-ipad"
             data-component="DeviceFrame"
             data-variant="ipad">
          <div class="ds-device-status-bar">
            <span class="ds-device-time">9:41</span>
            <div class="ds-device-indicators">
              <svg width="17" height="12" viewBox="0 0 17 12" fill="none" aria-hidden="true">
                <rect x="0" y="6" width="3" height="6" rx="1" fill="white"/>
                <rect x="4.5" y="4" width="3" height="8" rx="1" fill="white"/>
                <rect x="9" y="2" width="3" height="10" rx="1" fill="white"/>
                <rect x="13.5" y="0" width="3" height="12" rx="1" fill="white"/>
              </svg>
              <svg width="25" height="12" viewBox="0 0 25 12" fill="none" aria-hidden="true">
                <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.35"/>
                <rect x="2" y="2" width="14" height="8" rx="2" fill="white"/>
                <path d="M23 4v4a2 2 0 0 0 0-4z" fill="white" opacity="0.4"/>
              </svg>
            </div>
          </div>
          <div class="ds-device-screen">
            <div class="screen-placeholder">
              <div class="screen-placeholder-icon" style="width:80px;height:80px;border-radius:20px;"></div>
              <span class="screen-placeholder-label" style="font-size:24px;">Screen Content</span>
            </div>
          </div>
          <div class="ds-device-bottom-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       BROWSER
       ============================================================ -->
  <div class="demo-section">
    <div class="demo-label">Desktop Browser — 1440 × 900px</div>
    <div class="scale-wrap-browser">
      <div class="demo-scaled scale-browser">
        <div class="ds-device ds-device-browser"
             data-component="DeviceFrame"
             data-variant="browser">
          <div class="ds-device-titlebar">
            <!-- Traffic lights -->
            <div class="ds-device-traffic-lights">
              <div class="ds-device-traffic-light close"></div>
              <div class="ds-device-traffic-light minimize"></div>
              <div class="ds-device-traffic-light maximize"></div>
            </div>
            <!-- URL bar -->
            <div class="ds-device-url-bar">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
                <path d="M6 1a5 5 0 1 0 0 10A5 5 0 0 0 6 1zM2 6a4 4 0 1 1 8 0A4 4 0 0 1 2 6z" fill="rgba(255,255,255,0.4)"/>
                <path d="M5.5 4a.5.5 0 0 1 1 0v2.5l1.5 1a.5.5 0 0 1-.5.87L5.5 6.87V4z" fill="rgba(255,255,255,0.4)"/>
              </svg>
              <span class="ds-device-url-text">app.example.com/home</span>
            </div>
            <!-- Tab label -->
            <span class="ds-device-tab">My App — Home</span>
          </div>
          <div class="ds-device-screen">
            <div class="screen-placeholder" style="font-size:18px;">
              <div class="screen-placeholder-icon" style="width:64px;height:64px;border-radius:16px;"></div>
              <span class="screen-placeholder-label" style="font-size:16px;">Screen Content</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
