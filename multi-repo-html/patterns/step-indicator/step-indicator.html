<!--
  StepIndicator — Pattern Snippet
  Figma: bubbles-kit › node 108:9891 "StepIndicator"

  12×12 circular dot representing a single step in a timeline.
    - Incomplete: hollow circle with border-default stroke
    - Completed:  solid success fill + white checkmark

  Include step-indicator.css (and semantic.css) to render.
-->

<!-- ============================================================
     State 1: Incomplete (default)
     Hollow circle — step not yet done
     ============================================================ -->
<div class="ds-step-indicator"
     data-component="StepIndicator"
     data-variant="incomplete"
     data-state="incomplete"
     aria-label="Step incomplete">
</div>

<!-- ============================================================
     State 2: Completed
     Solid green fill with white checkmark — step finished
     ============================================================ -->
<div class="ds-step-indicator completed"
     data-component="StepIndicator"
     data-variant="completed"
     data-state="completed"
     aria-label="Step completed">
  <!-- Inline checkmark SVG — Phosphor "Check" Bold, 8px -->
  <svg
    xmlns="http://www.w3.org/2000/svg"
    width="8"
    height="8"
    viewBox="0 0 256 256"
    fill="var(--icons-white)"
    aria-hidden="true">
    <path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/>
  </svg>
</div>
