<!--
  Stepper — Pattern Snippet
  Figma: bubbles-kit › node 108:4357 "TimelineStepper"

  Vertical timeline composing StepIndicator + TextBlock per step,
  with connector lines between steps.

  Requires: stepper.css + step-indicator.css + text-block.css + semantic.css
-->

<!-- ============================================================
     3-step stepper: 2 completed + 1 incomplete
     ============================================================ -->
<div class="ds-stepper"
     data-component="Stepper"
     data-variant="default">

  <!-- Step 1: Completed -->
  <div class="ds-stepper-step">
    <div class="ds-stepper-track">
      <!-- StepIndicator: completed -->
      <div class="ds-step-indicator completed"
           data-component="StepIndicator"
           data-state="completed"
           aria-label="Step completed">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="8"
          height="8"
          viewBox="0 0 256 256"
          fill="var(--icons-white)"
          aria-hidden="true">
          <path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/>
        </svg>
      </div>
      <!-- Connector to next step -->
      <div class="ds-stepper-connector" aria-hidden="true"></div>
    </div>
    <div class="ds-stepper-content">
      <div class="ds-text-block" data-component="TextBlock">
        <div class="ds-text-block-header">
          <p class="ds-text-block-title">Ordered</p>
          <p class="ds-text-block-subtext">Mar 1, 2025</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Step 2: Completed -->
  <div class="ds-stepper-step">
    <div class="ds-stepper-track">
      <!-- StepIndicator: completed -->
      <div class="ds-step-indicator completed"
           data-component="StepIndicator"
           data-state="completed"
           aria-label="Step completed">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="8"
          height="8"
          viewBox="0 0 256 256"
          fill="var(--icons-white)"
          aria-hidden="true">
          <path d="M229.66,77.66l-128,128a8,8,0,0,1-11.32,0l-56-56a8,8,0,0,1,11.32-11.32L96,188.69,218.34,66.34a8,8,0,0,1,11.32,11.32Z"/>
        </svg>
      </div>
      <!-- Connector to next step -->
      <div class="ds-stepper-connector" aria-hidden="true"></div>
    </div>
    <div class="ds-stepper-content">
      <div class="ds-text-block" data-component="TextBlock">
        <div class="ds-text-block-header">
          <p class="ds-text-block-title">Shipped</p>
          <p class="ds-text-block-subtext">Mar 3, 2025</p>
        </div>
        <p class="ds-text-block-body">Your order has left the warehouse and is on its way.</p>
      </div>
    </div>
  </div>

  <!-- Step 3: Incomplete (last — no connector) -->
  <div class="ds-stepper-step">
    <div class="ds-stepper-track">
      <!-- StepIndicator: incomplete -->
      <div class="ds-step-indicator"
           data-component="StepIndicator"
           data-state="incomplete"
           aria-label="Step incomplete">
      </div>
      <!-- No connector on last step -->
    </div>
    <div class="ds-stepper-content">
      <div class="ds-text-block" data-component="TextBlock">
        <div class="ds-text-block-header">
          <p class="ds-text-block-title">Delivered</p>
          <p class="ds-text-block-subtext">Arriving Mar 5, 2025</p>
        </div>
      </div>
    </div>
  </div>

</div>
