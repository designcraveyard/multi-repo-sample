<!--
  ListItem — Pattern Snippet
  Figma: bubbles-kit › "ListItem"

  Horizontal row composing Thumbnail + TextBlock + optional trailing
  action (Button | IconButton | Badge).

  Requires: list-item.css + text-block.css + semantic.css
  Also reference: thumbnail.css, badge.css, button.css, icon-button.css
-->

<!-- ============================================================
     Variant 1: Thumbnail + text + trailing badge
     ============================================================ -->
<div class="ds-list-item"
     data-component="ListItem"
     data-variant="thumbnail-text-badge">
  <div class="ds-list-item-row">
    <!-- Leading: thumbnail -->
    <div class="ds-list-item-leading">
      <div class="ds-thumbnail md"
           data-component="Thumbnail"
           data-size="md"
           style="width:40px;height:40px;border-radius:var(--radius-md);overflow:hidden;background-color:var(--surfaces-base-high-contrast);">
        <img src="https://picsum.photos/seed/book/40/40" alt="Ayurveda Books" width="40" height="40" style="display:block;width:100%;height:100%;object-fit:cover;">
      </div>
    </div>
    <!-- Content: text block -->
    <div class="ds-list-item-content">
      <div class="ds-text-block" data-component="TextBlock">
        <div class="ds-text-block-header">
          <p class="ds-text-block-title">Ayurveda Books</p>
          <p class="ds-text-block-subtext">bought for Anjali at airport</p>
        </div>
      </div>
    </div>
    <!-- Trailing: badge -->
    <div class="ds-list-item-trailing">
      <span class="ds-badge sm brand"
            data-component="Badge"
            data-variant="brand"
            data-size="sm"
            style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);background-color:var(--surfaces-brand-interactive-low-contrast);color:var(--typography-brand);font-size:var(--typography-cta-sm-size);font-weight:var(--typography-cta-sm-weight);">
        New
      </span>
    </div>
  </div>
</div>

<!-- ============================================================
     Variant 2: Icon placeholder + text + trailing button
     ============================================================ -->
<div class="ds-list-item"
     data-component="ListItem"
     data-variant="icon-text-button">
  <div class="ds-list-item-row">
    <!-- Leading: icon placeholder (40×40 surface) -->
    <div class="ds-list-item-leading">
      <div class="ds-thumbnail md"
           data-component="Thumbnail"
           data-size="md"
           style="width:40px;height:40px;border-radius:var(--radius-md);background-color:var(--surfaces-base-high-contrast);display:flex;align-items:center;justify-content:center;">
        <!-- Phosphor "BookOpen" icon, 20px -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256" fill="var(--icons-secondary)" aria-hidden="true">
          <path d="M232,48H176a40,40,0,0,0-48,0H72A16,16,0,0,0,56,64V192a16,16,0,0,0,16,16H232a16,16,0,0,0,16-16V64A16,16,0,0,0,232,48Zm-56,0a24,24,0,0,1,24,24H152a24,24,0,0,1,24-24ZM72,64h48.26A39.82,39.82,0,0,0,120,72v16H72ZM232,192H72V104h48V88h16v16h48V88h16v16h32Z"/>
        </svg>
      </div>
    </div>
    <!-- Content: text block -->
    <div class="ds-list-item-content">
      <div class="ds-text-block" data-component="TextBlock">
        <div class="ds-text-block-header">
          <p class="ds-text-block-title">Trip Planning</p>
          <p class="ds-text-block-subtext">Bali · March 2025</p>
        </div>
      </div>
    </div>
    <!-- Trailing: button -->
    <div class="ds-list-item-trailing">
      <button class="ds-button secondary sm"
              data-component="Button"
              data-variant="secondary"
              data-size="sm">
        Edit
      </button>
    </div>
  </div>
</div>

<!-- ============================================================
     Variant 3: Text only + trailing icon button
     ============================================================ -->
<div class="ds-list-item"
     data-component="ListItem"
     data-variant="text-icon-button">
  <div class="ds-list-item-row">
    <!-- No leading slot -->
    <!-- Content: text block -->
    <div class="ds-list-item-content">
      <div class="ds-text-block" data-component="TextBlock">
        <div class="ds-text-block-header">
          <p class="ds-text-block-title">Inbox</p>
          <p class="ds-text-block-subtext">12 unread messages</p>
        </div>
      </div>
    </div>
    <!-- Trailing: icon button (DotsThree / more options) -->
    <div class="ds-list-item-trailing">
      <button class="ds-icon-button secondary sm"
              data-component="IconButton"
              data-variant="secondary"
              data-size="sm"
              aria-label="More options"
              style="width:28px;height:28px;border-radius:var(--radius-full);border:none;background-color:var(--surfaces-brand-interactive-low-contrast);display:flex;align-items:center;justify-content:center;cursor:pointer;">
        <!-- Phosphor "DotsThreeVertical" icon, 16px -->
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 256 256" fill="var(--icons-primary)" aria-hidden="true">
          <path d="M128,96a16,16,0,1,0,16,16A16,16,0,0,0,128,96Zm0-56a16,16,0,1,0,16,16A16,16,0,0,0,128,40Zm0,112a16,16,0,1,0,16,16A16,16,0,0,0,128,152Z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- ============================================================
     Variant 4: Thumbnail + text + trailing error badge + divider
     ============================================================ -->
<div class="ds-list-item"
     data-component="ListItem"
     data-variant="thumbnail-text-error-badge-divider">
  <div class="ds-list-item-row">
    <!-- Leading: thumbnail -->
    <div class="ds-list-item-leading">
      <div class="ds-thumbnail md"
           data-component="Thumbnail"
           data-size="md"
           style="width:40px;height:40px;border-radius:var(--radius-md);overflow:hidden;background-color:var(--surfaces-base-high-contrast);">
        <img src="https://picsum.photos/seed/mail/40/40" alt="Newsletter" width="40" height="40" style="display:block;width:100%;height:100%;object-fit:cover;">
      </div>
    </div>
    <!-- Content: text block -->
    <div class="ds-list-item-content">
      <div class="ds-text-block" data-component="TextBlock">
        <div class="ds-text-block-header">
          <p class="ds-text-block-title">Newsletter</p>
          <p class="ds-text-block-subtext">3 failed sends</p>
        </div>
      </div>
    </div>
    <!-- Trailing: error badge -->
    <div class="ds-list-item-trailing">
      <span class="ds-badge sm error"
            data-component="Badge"
            data-variant="error"
            data-size="sm"
            style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);background-color:var(--surfaces-error-subtle);color:var(--typography-error);font-size:var(--typography-cta-sm-size);font-weight:var(--typography-cta-sm-weight);">
        3
      </span>
    </div>
  </div>
  <!-- Bottom divider -->
  <div class="ds-list-item-divider"
       data-component="Divider"
       aria-hidden="true">
  </div>
</div>
